<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C. James Hawkins</title>
  <meta name="description" content="Writing on software, philosophy, and build tools — by Cary (C. James) Hawkins." />

  <!-- No-flash dark mode: apply the saved preference before first paint. -->
  <script>
    try {
      if (localStorage.getItem("dark_mode") === "1") {
        document.documentElement.classList.add("dark");
      }
    } catch (e) {}
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Single Page Apps for GitHub Pages: restore deep-link path from the 404 redirect. -->
  <script>
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search.slice(1).split("&").map(function (s) {
          return s.replace(/~and~/g, "&");
        }).join("?");
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>

  <!-- Boot splash, shown until Pyodide + the app are ready. -->
  <div id="loading-splash" class="splash">
    <div class="spinner"></div>
    <p>Booting the Python runtime…</p>
  </div>

  <div id="app"></div>

  <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
  <script type="py" src="main.py" config="pyscript.toml"></script>
</body>
</html>
