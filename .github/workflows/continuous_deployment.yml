name: Continuous deployment
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hatch
        run: pipx install hatch

      - name: Build site
        run: hatch run build

      - name: Lint
        run: hatch check code

      - name: Format check
        run: hatch check fmt

      - name: Type check
        run: hatch check types

      - name: Run tests
        run: hatch test

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hatch
        run: pipx install hatch

      - name: Build site
        run: hatch run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
